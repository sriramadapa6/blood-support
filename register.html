<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Support - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="donor-page">
    <nav>
        <div class="logo">Blood Support</div>
        <ul>
            <li><a href="index.html">Search Donors</a></li>
            <li><a href="smart-match.html">AI Smart Match</a></li>
            <li><a href="register.html" class="active">Register</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Become a Donor</h1>
            <p>Your blood can save a life. Register today.</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
                <label>Phone Number</label>
                <div style="display: flex; gap: 10px;">
                    <input type="tel" id="regPhone" placeholder="Enter your mobile number" required>
                    
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input 
                    type="email" 
                    id="regEmail" 
                    placeholder="Enter your email address" 
                    required
                >
            </div>
            <div class="form-group">
                <label>Blood Group</label>
                <select id="regBloodGroup" required>
                    <option value="" disabled selected>Select Blood Group</option>
                    <option value="A+">A+</option><option value="A-">A-</option>
                    <option value="B+">B+</option><option value="B-">B-</option>
                    <option value="O+">O+</option><option value="O-">O-</option>
                    <option value="AB+">AB+</option><option value="AB-">AB-</option>
                </select>
            </div>

            <div class="form-group">
                <label>State</label>
                <select id="regState" required>
                    <option value="" disabled selected>Select State</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>District</label>
                <select id="regDistrict" required disabled>
                    <option value="" disabled selected>Select District</option>
                </select>
            </div>
            <div class="form-group">
                <label>City / Locality</label>
                <input type="text" id="regCity" placeholder="Enter your city" required>
            </div>
            
            <!-- ✅ OTP Verification Status Indicator -->

            <button type="submit" class="btn">Register Now</button>

        <div id="reg-result" class="ai-result-box" style="border-left-color: #28a745; color: #155724; background-color: #d4edda;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>

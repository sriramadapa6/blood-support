<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Support - Find a Donor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="search-page">

    <nav>
        <div class="logo">🩸 Blood Support</div>
        <ul>
            <li><a href="index.html" class="active">Search Donors</a></li>
            <li><a href="smart-match.html">AI Smart Match</a></li>
            <li><a href="register.html">Register</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Search Donors</h1>
            <p>Find a blood donor in your exact city.</p>
        </div>
        

        <form id="searchForm">
            <div class="form-group">
                <label>Blood Group</label>
                <select id="bloodGroup" required>
                    <option value="" disabled selected>Select Blood Group</option>
                    <option value="A+">A+</option><option value="A-">A-</option>
                    <option value="B+">B+</option><option value="B-">B-</option>
                    <option value="O+">O+</option><option value="O-">O-</option>
                    <option value="AB+">AB+</option><option value="AB-">AB-</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>State</label>
                <select id="searchState" required>
                    <option value="" disabled selected>Select State</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>District</label>
                <select id="searchDistrict" required disabled>
                    <option value="" disabled selected>Select District</option>
                </select>
            </div>

            <button type="submit" class="btn">🔍 Search Donors</button>
        </form>
        
        <div id="results" class="ai-result-box"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
